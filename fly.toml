# fly.toml app configuration file generated for srt-group-todo-list on 2026-07-06T01:54:09Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'srt-group-todo-list'
primary_region = 'iad'

[build]

[[mounts]]
  source = 'data'
  destination = '/app/data'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
